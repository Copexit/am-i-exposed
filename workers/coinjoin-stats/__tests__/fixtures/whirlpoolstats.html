<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashigaru Whirlpool Statistics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', 'Monaco', 'Menlo', monospace;
            background: #000000;
            color: #00ff00;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        
        .container {
            max-width: 4xl;
            margin: 0 auto;
            background: #111111;
            border: 2px solid #00ff00;
            border-radius: 0.5rem;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: #000000;
            color: #00ff00;
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid #00ff00;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 1.125rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 2rem;
            background: #111111;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #222222;
            border: 1px solid #00ff00;
            border-radius: 0.25rem;
            padding: 1.5rem;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #00ff00;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.5rem;
        }
        
        .stat-card p {
            font-size: 2rem;
            font-weight: 700;
            color: #00ff00;
        }
        
        .pool-section {
            margin-bottom: 2rem;
        }
        
        .pool-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .pool-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #00ff00;
            margin-right: 1rem;
        }
        
        .pool-badge {
            background: #3b82f6;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .pool-details {
            background: #222222;
            border: 1px solid #00ff00;
            border-radius: 0.25rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .pool-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .pool-stat:last-child {
            margin-bottom: 0;
        }
        
        .pool-stat span:first-child {
            color: #00ff00;
            font-weight: 500;
        }
        
        .pool-stat span:last-child {
            color: #00ff00;
            font-weight: 600;
        }
        
        .genesis-info {
            background: #222222;
            border: 1px solid #00ff00;
            border-radius: 0.25rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .genesis-info h4 {
            color: #00ff00;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .genesis-info p {
            color: #00ff00;
            font-size: 0.875rem;
            font-family: monospace;
        }
        
        .total-section {
            background: #000000;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 0.25rem;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .total-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .total-section p {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .total-section small {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        
        .footer {
            background: #000000;
            border-top: 2px solid #00ff00;
            padding: 1.5rem 2rem;
            text-align: center;
            color: #00ff00;
        }
        
        .footer p {
            margin-bottom: 0.5rem;
        }
        
        .footer p:last-child {
            margin-bottom: 0;
        }
        
        .txid {
            font-family: monospace;
            font-size: 0.75rem;
            background: #222222;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            border: 1px solid #00ff00;
            word-break: break-all;
            color: #00ff00;
        }
        
        a {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Ashigaru Whirlpool Statistics</h1>
        </div>
        
        <div class="content">
        <div class="total-section">
                <h2>Total BTC in Ashigaru Whirlpool</h2>
                <p>157.600 BTC</p>
                <a href="chart.html">View Chart</a>
            </div>
            
            <div class="pool-section">
                <div class="pool-header">
                    <h2>0.025 BTC Pool</h2>
                </div>
                <div class="pool-details">
                    <div class="pool-stat">
                        <span>Total BTC Entered</span>
                        <span>32.100 BTC</span>
                    </div>
                    <div class="pool-stat">
                        <span>Cycles</span>
                        <span>459</span>
                    </div>
                </div>
            </div>
            
            <div class="pool-section">
                <div class="pool-header">
                    <h2>0.25 BTC Pool</h2>
                </div>
                <div class="pool-details">
                    <div class="pool-stat">
                        <span>Total BTC Entered</span>
                        <span>125.500 BTC</span>
                    </div>
                    <div class="pool-stat">
                        <span>Cycles</span>
                        <span>191</span>
                    </div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Last Updated</h3>
                    <p style="color: #00ff00;">08:21:07 UTC, June 01, 2026</p>
                </div>
                <div class="stat-card">
                    <h3>Block Range</h3>
                    <p>899,205 - 951,952</p>
                </div>
            </div>
            
            
        </div>
        
        <div class="footer">
                        <img src="logo.png" alt="Ashigaru Whirlpool Logo" style="width: 100px; height: 100px;">
        </div>
    </div>
</body>
</html>
